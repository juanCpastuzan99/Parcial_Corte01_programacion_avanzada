<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acortador de Enlaces</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .browser-bar {
            width: 100%;
            max-width: 700px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 13px;
            color: #333;
            margin-bottom: 10px;
        }

        .page {
            width: 100%;
            max-width: 700px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }

        nav {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 14px;
            border-radius: 3px;
        }

        nav a.home    { background: #28a745; color: white; }
        nav a.enlaces { background: #17a2b8; color: white; }

        .content {
            padding: 30px 40px 40px;
        }

        h1 {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.06em;
            color: #222;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Alerta de error */
        .alert-error {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-left: 4px solid #e53e3e;
            border-radius: 4px;
            padding: 10px 14px;
            margin-bottom: 18px;
            font-size: 13px;
            color: #c53030;
        }

        .alert-error span { flex: 1; }

        .alert-error button {
            background: none;
            border: none;
            color: #c53030;
            font-size: 16px;
            cursor: pointer;
            padding: 0 0 0 10px;
            line-height: 1;
        }

        .alert-error button:hover { color: #9b2c2c; }

        /* Alerta de éxito */
        .alert-success {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            border-left: 4px solid #38a169;
            border-radius: 4px;
            padding: 10px 14px;
            margin-bottom: 18px;
            font-size: 13px;
            color: #276749;
        }

        .alert-success span { flex: 1; }

        .alert-success button {
            background: none;
            border: none;
            color: #276749;
            font-size: 16px;
            cursor: pointer;
            padding: 0 0 0 10px;
            line-height: 1;
        }

        .field { margin-bottom: 14px; }

        input[type="url"],
        input[type="text"],
        textarea {
            width: 100%;
            border: 1px solid #bbb;
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 13px;
            color: #555;
            background: white;
            outline: none;
            font-family: Arial, sans-serif;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus { border-color: #888; }
        input::placeholder, textarea::placeholder { color: #aaa; }

        textarea { resize: none; height: 80px; }

        .btn-enviar {
            margin-top: 6px;
            background: white;
            border: 1px solid #999;
            border-radius: 4px;
            padding: 7px 22px;
            font-size: 13px;
            cursor: pointer;
            color: #333;
        }

        .btn-enviar:hover { background: #f5f5f5; }
    </style>
</head>
<body>

    <div class="browser-bar">https://www.direccion.com</div>

    <div class="page">
        <nav>
            <a href="/" class="home">HOME</a>
            <a href="/enlaces" class="enlaces">ENLACES</a>
        </nav>

        <div class="content">
            <h1>Acortador de Enlaces</h1>

            <!-- Alerta de error -->
            {% if request.args.get('error') %}
            <div class="alert-error" id="alertaError">
                <span>⚠️ {{ request.args.get('error') }}</span>
                <button onclick="document.getElementById('alertaError').style.display='none'">✕</button>
            </div>
            {% endif %}

            <!-- Alerta de éxito -->
            {% if request.args.get('success') %}
            <div class="alert-success" id="alertaExito">
                <span>✓ {{ request.args.get('success') }}</span>
                <button onclick="document.getElementById('alertaExito').style.display='none'">✕</button>
            </div>
            {% endif %}

            <form action="/enlaces/crear" method="POST">
                <div class="field">
                    <input type="url" name="enlace_original" placeholder="Pegar enlace" required>
                </div>
                <div class="field">
                    <input type="text" name="url_imagen" placeholder="Pegar dirección de imagen">
                </div>
                <div class="field">
                    <textarea name="descripcion" placeholder="Descripción del enlace"></textarea>
                </div>
                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </div>
    </div>

</body>
</html>
